<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<title>10-pull reveal — A vs B</title>
<link rel="stylesheet" href="fonts.css">
<style>

  :root{--bg:#000000;--panel:0px;--vidx:0px;--vidy:0px;--vidscale:1;--gold:#E9B84A;--gold-a:#f4d27a;--gold-b:#b8862e;--muted:#8d8a82}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:#e8e6e0;font-family:var(--font-body);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;overflow-y:auto;padding:24px 0}
  .backlink{position:fixed;top:18px;left:20px;z-index:20;color:#cfccc4;text-decoration:none;font-size:12px;letter-spacing:2px;border:1px solid rgba(255,255,255,.2);padding:8px 14px;border-radius:8px}
  .backlink:hover{color:var(--gold);border-color:var(--gold)}
  .title{font-family:var(--font-head);font-weight:800;font-size:28px;letter-spacing:3px;
    background:linear-gradient(180deg,var(--gold-a),var(--gold-b));-webkit-background-clip:text;background-clip:text;color:transparent}


  .stage{position:relative;width:min(360px,80vw);aspect-ratio:1/1;display:flex;align-items:center;justify-content:center}
  .capsule{width:100%;height:100%;object-fit:contain;cursor:pointer;animation:float 4.5s ease-in-out infinite;
    transition:transform .9s ease, opacity .9s ease, filter .9s ease;z-index:2}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3%)}}
  .flash{position:absolute;inset:0;margin:auto;width:42%;height:42%;border-radius:50%;
    background:radial-gradient(circle,rgba(255,235,170,.98),rgba(233,184,74,.6) 40%,transparent 70%);
    opacity:0;transform:scale(.4);z-index:1;filter:blur(4px);transition:opacity .5s ease, transform .9s ease}
  .floor{position:absolute;left:50%;bottom:8%;width:55%;height:9%;transform:translateX(-50%);border-radius:50%;
    background:radial-gradient(ellipse,rgba(233,184,74,.45),transparent 70%);filter:blur(2px);opacity:.6;z-index:0}
  .stage.opening .capsule{transform:scale(1.18);opacity:0;filter:brightness(2.2)}
  .stage.opening .flash{opacity:1;transform:scale(1.25)}
  .stage.opening .floor{opacity:0}

  /* single result card */
  .result{position:absolute;inset:0;margin:auto;width:42%;z-index:3;opacity:0;transform:translateY(8%) scale(.7);
    transition:opacity .5s ease .1s, transform .7s cubic-bezier(.2,1.3,.4,1) .1s;pointer-events:none}
  .stage.single .result{opacity:1;transform:translateY(0) scale(1)}
  .result img{width:100%;aspect-ratio:958/1280;object-fit:contain;display:block;
    border-radius:10px;box-shadow:0 0 42px -4px var(--rc,#E9B84A)}
  .badge{position:absolute;top:8px;left:8px;font-size:9px;font-weight:700;letter-spacing:.5px;padding:3px 7px;border-radius:5px;z-index:2}
  .badge.new{background:var(--gold);color:#000}.badge.dup{background:#555;color:#fff}

  .info{height:64px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
  .hint{font-size:12px;letter-spacing:3px;color:var(--muted);display:none}
  .you{font-size:11px;letter-spacing:3px;color:var(--gold);opacity:0;transition:.3s}
  .got{font-weight:700;font-size:20px;opacity:0;transition:.3s}.got b{color:var(--rc,#E9B84A);margin-left:8px}
  .stage.single ~ .info .you,.stage.single ~ .info .got{opacity:1}

  .acts{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .b{border:1px solid var(--gold);color:var(--gold);background:transparent;padding:12px 22px;border-radius:9px;
    font-weight:600;font-size:13px;letter-spacing:1.4px;cursor:pointer;transition:.2s}
  .b:hover{background:var(--gold);color:#000}
  .b.solid{background:var(--gold);color:#000}.b.solid:hover{filter:brightness(1.1)}
  .b.ghost{border-color:rgba(255,255,255,.25);color:#cfccc4}.b.ghost:hover{background:rgba(255,255,255,.1);color:#fff}
  .hidden{display:none}

  /* 10-pull result overlay */
  .multi{position:fixed;inset:0;background:rgba(4,4,4,.96);z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:30px}
  .multi.show{display:flex}
  @media(max-width:1100px){ .mgrid{grid-template-columns:repeat(4,1fr);max-width:94vw} }
  @media(max-width:760px){ .mgrid{grid-template-columns:repeat(3,1fr);gap:12px} }
  @media(max-width:480px){ .mgrid{grid-template-columns:repeat(2,1fr);gap:10px} }
  .multi h3{font-size:14px;letter-spacing:3px;color:var(--gold)}
  .mgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;max-width:min(92vw,1280px);width:100%}
  .mcard{position:relative;border-radius:12px;overflow:hidden;border:1.5px solid var(--rc,#cfccc4);background:#070707;
    box-shadow:0 0 22px -8px var(--rc,#cfccc4);opacity:0;transform:scale(.8);animation:pop .4s forwards}
  @keyframes pop{to{opacity:1;transform:scale(1)}}
  .mcard img{width:100%;aspect-ratio:958/1280;object-fit:contain;display:block;background:#000}
  .mcard .mf{text-align:center;padding:7px 3px 9px}
  .mcard .mn{font-size:12.5px;color:#fff;font-weight:600}
  .mcard .mr{font-size:10.5px;color:var(--rc,#cfccc4);letter-spacing:1px}
  .mcard .mb{position:absolute;top:6px;left:6px;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:4px}
  .mcard .mb.new{background:var(--gold);color:#000}.mcard .mb.dup{background:#555;color:#fff}
  .summary{font-size:12px;color:var(--muted);letter-spacing:1px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  .summary span b{color:#fff}

  /* session history */
  .history{width:min(540px,90vw);font-size:12px;color:var(--muted)}
  .history .ht{letter-spacing:2px;color:#cfccc4;margin-bottom:8px;display:flex;justify-content:space-between}
  .tally{display:flex;gap:10px;flex-wrap:wrap}
  .tally .t{padding:5px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.1)}
  .tally .t b{color:var(--rc);font-weight:700}

  /* ===== ENHANCED REVEAL ENGINE ===== */
  .stage{--burst:#E9B84A}
  .capsule.whole{z-index:2}
  .half{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:2;opacity:0;
    pointer-events:none;transition:transform .8s cubic-bezier(.28,.86,.24,1),opacity .55s ease}
  .half.top{clip-path:inset(0 0 50% 0)}
  .half.bottom{clip-path:inset(50% 0 0 0)}
  @keyframes cshake{0%,100%{transform:translate(0,0)}20%{transform:translate(-2px,1px)}
    40%{transform:translate(2px,-1px)}60%{transform:translate(-1.5px,-1px)}80%{transform:translate(1.5px,1px)}}
  .stage.charging .whole{animation:cshake .14s linear infinite;filter:brightness(1.5) drop-shadow(0 0 16px var(--burst))}
  .stage.opening .whole{animation:none;opacity:0;transform:scale(1.04);filter:brightness(2.4);
    transition:opacity .22s ease,transform .8s ease,filter .8s ease}
  .stage.opening .half{opacity:1}
  .stage.opening .top{transform:translateY(-40%) rotate(-4deg)}
  .stage.opening .bottom{transform:translateY(40%) rotate(4deg)}
  .stage.single .half{opacity:0;transition:opacity .45s ease}
  .core{position:absolute;inset:0;margin:auto;width:30%;height:30%;border-radius:50%;z-index:1;
    background:radial-gradient(circle,#fff 0%,var(--burst) 42%,transparent 72%);
    opacity:0;transform:scale(.25);filter:blur(3px);
    transition:opacity .45s ease,transform .85s cubic-bezier(.2,1,.3,1)}
  .stage.opening .core{opacity:1;transform:scale(1.6)}
  .stage.single .core{opacity:.45;transform:scale(1.1);transition:opacity .5s ease,transform .6s ease}
  .rays{position:absolute;inset:-10%;margin:auto;z-index:0;opacity:0;transform:scale(.6) rotate(0deg);
    background:repeating-conic-gradient(from 0deg,rgba(255,255,255,0) 0deg 7deg,
      color-mix(in srgb,var(--burst) 55%,transparent) 7deg 8.2deg,rgba(255,255,255,0) 8.2deg 15deg);
    -webkit-mask:radial-gradient(circle,#000 8%,rgba(0,0,0,.5) 30%,transparent 62%);
            mask:radial-gradient(circle,#000 8%,rgba(0,0,0,.5) 30%,transparent 62%);
    transition:opacity .5s ease,transform 1.15s cubic-bezier(.2,.9,.3,1)}
  .stage.opening .rays{opacity:.85;transform:scale(1.25) rotate(26deg)}
  .stage.single .rays{opacity:.25;transform:scale(1.1) rotate(34deg);transition:opacity .6s ease,transform .9s ease}
  .flash{background:radial-gradient(circle,rgba(255,245,210,.98),var(--burst) 42%,transparent 72%)}

  /* ===== INNER LIGHT LEAK (strong light bleeding from inside) — video overlay, screen blend ===== */
  .leakvid{position:absolute;inset:0;margin:auto;width:100%;height:100%;object-fit:contain;z-index:3;
    opacity:0;mix-blend-mode:screen;pointer-events:none;transition:opacity .25s ease;border-radius:10px;background:transparent}
  .stage.single .leakvid{opacity:0}

  /* ===== EFFECTS LAB ===== */
  .stage.no-rays .rays{display:none}
  .stage.no-core .core{display:none}
  @keyframes spin360{to{transform:rotate(360deg)}}
  .stage.spin-on.charging .whole{animation:spin360 .5s ease;filter:brightness(1.5) drop-shadow(0 0 16px var(--burst))}
  @keyframes zoomp{0%{transform:scale(1)}28%{transform:scale(1.08)}100%{transform:scale(1)}}
  .stage.zoomp{animation:zoomp .5s ease}
  @keyframes shakep{0%,100%{transform:translate(0,0)}15%{transform:translate(-7px,3px)}30%{transform:translate(7px,-3px)}45%{transform:translate(-6px,-2px)}60%{transform:translate(6px,2px)}80%{transform:translate(-3px,1px)}}
  body.shakep{animation:shakep .45s ease}
  .shock{position:absolute;inset:0;margin:auto;width:28%;height:28%;border-radius:50%;border:3px solid var(--burst);opacity:0;z-index:1;pointer-events:none;box-shadow:0 0 18px var(--burst)}
  @keyframes shockp{0%{opacity:.9;transform:scale(.3)}100%{opacity:0;transform:scale(2.8)}}
  .shock.go{animation:shockp .7s ease-out}
  .particles{position:absolute;inset:0;margin:auto;width:0;height:0;z-index:2;pointer-events:none}
  .particles i{position:absolute;left:0;top:0;width:8px;height:8px;border-radius:50%;
    background:radial-gradient(circle,#fff,var(--burst));opacity:0;transform:translate(-50%,-50%)}
  @keyframes pfly{0%{opacity:1;transform:translate(-50%,-50%) translate(0,0) scale(1)}
    100%{opacity:0;transform:translate(-50%,-50%) translate(var(--x),var(--y)) scale(.3)}}
  .particles i.go{animation:pfly .85s ease-out forwards}
  .pillar{position:absolute;left:50%;bottom:2%;width:46%;height:0;transform:translateX(-50%);z-index:1;opacity:0;
    background:linear-gradient(to top,var(--burst),transparent);filter:blur(7px);mix-blend-mode:screen;pointer-events:none}
  .stage.pillar-on .pillar{opacity:.7;height:92%;transition:height .7s ease,opacity .5s ease}

  /* ----- control panel ----- */
  .lab{position:fixed;top:14px;right:14px;z-index:50;width:182px;background:rgba(12,12,12,.94);
    border:1px solid rgba(233,184,74,.3);border-radius:12px;padding:12px;font-family:var(--font-body);
    color:#ddd;font-size:11px;backdrop-filter:blur(6px);max-height:94vh;overflow:auto}
  .lab-h{font-family:var(--font-head);font-weight:800;letter-spacing:2px;color:var(--gold);font-size:12px;margin-bottom:8px}
  .lab-sec{color:#888;letter-spacing:1.5px;font-size:9px;margin:10px 0 5px;text-transform:uppercase}
  .lab label{display:flex;align-items:center;gap:7px;padding:3px 0;cursor:pointer}
  .lab input[type=checkbox]{accent-color:var(--gold);width:14px;height:14px}
  .lab-row{display:flex;gap:5px;flex-wrap:wrap}
  .lab-row button{flex:1;min-width:30px;background:#1b1b1b;border:1px solid #333;color:#ccc;border-radius:6px;
    padding:6px 4px;font-size:10px;cursor:pointer;font-family:var(--font-body)}
  .lab-row button:hover{border-color:var(--gold);color:var(--gold)}
  .lab-row button.on{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
  .lab input[type=range]{width:118px;accent-color:var(--gold);vertical-align:middle}
  .lab-open{width:100%;margin-top:12px;background:var(--gold);color:#000;border:none;border-radius:8px;
    padding:10px;font-weight:800;letter-spacing:1px;cursor:pointer;font-family:var(--font-head);font-size:12px}
  .lab-open:hover{filter:brightness(1.1)}

  /* ===== PARTS OPEN SYSTEM ===== */
  .inside,.bowl,.lid{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none}
  .inside{z-index:0;opacity:0;background-size:contain;background-position:center;background-repeat:no-repeat;
    transition:opacity .55s ease .12s}
  .inside-ph{background:radial-gradient(ellipse at 50% 44%,#2b2410 0%,#181206 38%,#070707 72%)}
  .bowl{z-index:2}
  .lid{z-index:3;transition:transform .85s cubic-bezier(.3,.82,.24,1),opacity .7s ease,filter .7s ease}
  .stage:not(.parts) .inside,.stage:not(.parts) .bowl,.stage:not(.parts) .lid{display:none}
  .stage.parts .whole,.stage.parts .half{display:none}
  .stage.parts.charging .lid{animation:cshake .14s linear infinite;filter:brightness(1.4) drop-shadow(0 0 14px var(--burst))}
  .stage.parts.opening .lid{transform:translateY(-50%) scale(.86) rotate(-1deg);opacity:0;filter:brightness(2.2)}
  .stage.parts.opening .inside{opacity:1}
  .stage.parts .result{z-index:4}

  /* ===== LIGHT FX PNG SYSTEM ===== */
  .fxi{position:absolute;inset:0;margin:auto;width:125%;height:125%;object-fit:contain;
    mix-blend-mode:screen;opacity:0;pointer-events:none;z-index:1;transform:scale(.4);
    filter:var(--fxf,none)}
  .stage:not(.fxpng) .fxi{display:none}
  .stage.fxpng .core,.stage.fxpng .rays{display:none}   /* avoid double glow */
  .stage.fxpng.opening .fxi.burst{opacity:1;transform:scale(1.5);transition:opacity .4s ease,transform .8s cubic-bezier(.2,1,.3,1)}
  .stage.fxpng.opening .fxi.rays{opacity:.9;transform:scale(1.45) rotate(38deg);transition:opacity .5s ease,transform 1.15s ease}
  .stage.fxpng.opening .fxi.spark{opacity:1;transform:scale(1.65);transition:opacity .5s ease,transform .95s ease}
  .stage.fxpng.single .fxi{opacity:0;transition:opacity .5s ease}

  /* panel: mode/source buttons reuse .lab-row button styles */
  .lab-note{font-size:9px;color:#7a7a7a;margin-top:4px;line-height:1.4}
  .lab-note b{color:#5cc8a0}
  .lab-note .miss{color:#c87a7a}

  /* ---- ten-pull reveal styles: A (split) and B (sequential) ---- */

  /* B: cards appear one after another, flipping up into place */
  .mcard.seq{
    animation:none !important;
    opacity:0;
    transform: perspective(900px) rotateY(-70deg) scale(.92);
    transform-origin:center;
    animation: seqIn .42s cubic-bezier(.2,.85,.3,1) forwards !important;
  }
  @keyframes seqIn{
    0%   { opacity:0; transform: perspective(900px) rotateY(-70deg) scale(.92); }
    60%  { opacity:1; }
    100% { opacity:1; transform: perspective(900px) rotateY(0) scale(1); }
  }

  /* ten-pull: one card in the middle, then it splits into the ten */
  .mcard.split{
    animation:none;   /* override the default pop */
    opacity:0;
    transform: translate(var(--dx,0), var(--dy,0)) scale(1.35);
    animation: splitOut .5s cubic-bezier(.2,.9,.25,1) forwards !important;
  }
  @keyframes splitOut{
    0%   { opacity:0; transform: translate(var(--dx,0), var(--dy,0)) scale(1.35); }
    12%  { opacity:1; transform: translate(var(--dx,0), var(--dy,0)) scale(1.35); }
    100% { opacity:1; transform: translate(0,0) scale(1); }
  }

  /* while the 10-pull result is open, the stage buttons underneath must not show */
  body.multi-open .acts{display:none !important}

  /* 10-pull result footer: share + continue side by side */
  .macts{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:18px;flex-wrap:wrap}

  /* share on X */
  .b.share{border:1px solid rgba(255,255,255,.22);color:#e8e6e0;background:rgba(255,255,255,.04)}
  .b.share:hover{border-color:#fff;background:rgba(255,255,255,.1)}
  /* rare pulls are worth bragging about: make the button pop */
  .b.share.hot{border-color:var(--rc,#E9B84A);color:var(--rc,#E9B84A);
    background:color-mix(in srgb, var(--rc,#E9B84A) 12%, transparent);
    box-shadow:0 0 22px -8px var(--rc,#E9B84A)}
  .b.share.hot:hover{background:color-mix(in srgb, var(--rc,#E9B84A) 22%, transparent)}

  /* pulls remaining + charge */
  .pullsbox{display:inline-flex;align-items:center;gap:10px;margin-left:14px;padding:0 4px 0 14px;
    border-left:1px solid rgba(255,255,255,.14)}
  .pullsbox .pl{font-size:10px;letter-spacing:2px;color:#8d8a82}
  .pullsbox .pv{font-weight:700;font-size:17px;color:var(--gold);min-width:22px;text-align:center}
  .b.charge{padding:8px 13px;font-size:12px;letter-spacing:1px;border:1px solid rgba(233,184,74,.5);
    color:var(--gold);background:rgba(233,184,74,.08)}
  .b.charge:hover{background:rgba(233,184,74,.18)}
  .stage.single ~ .acts .pullsbox{display:none}
  @media(max-width:700px){ .pullsbox{margin-left:8px;padding-left:10px;gap:7px} .pullsbox .pl{display:none} }

  /* ===== BIG CARD REVEAL (single, fullscreen center) ===== */
  @keyframes rvFade{from{opacity:0}to{opacity:1}}
  @keyframes rvPop{0%{opacity:0;transform:scale(.55) translateY(6%)}60%{opacity:1}100%{opacity:1;transform:scale(1) translateY(0)}}
  .stage.single::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 45%,rgba(20,16,10,.85),rgba(3,3,3,.96));z-index:38;animation:rvFade .6s ease both}
  .stage.single .result{position:fixed;top:4vh;left:0;right:var(--panel);margin:0 auto;width:auto;height:min(70vh, calc(100vh - 210px));max-width:min(46vw,540px);aspect-ratio:958/1280;
    z-index:40;opacity:1;transform:none;animation:cardEmerge .8s cubic-bezier(.16,.84,.28,1) both}
  /* rises from below as a small dark card, grows, then a final shine */
  @keyframes cardEmerge{
    0%   {opacity:0; transform:translateY(8vh) scale(.42); filter:brightness(.15) saturate(.5)}
    15%  {opacity:1}
    55%  {transform:translateY(0) scale(1); filter:brightness(.18) saturate(.5)}
    72%  {filter:brightness(2.4) saturate(1.5)}
    100% {opacity:1; transform:translateY(0) scale(1); filter:brightness(1) saturate(1)}
  }
  .result .shine{position:absolute;inset:0;border-radius:14px;pointer-events:none;z-index:5;opacity:0;
    background:linear-gradient(115deg,transparent 40%,rgba(255,255,255,.9) 50%,transparent 60%);
    background-size:260% 100%;background-position:175% 0}
  .stage.single .result .shine{animation:cardShine .6s ease .72s both}
  @keyframes cardShine{0%{opacity:0;background-position:175% 0}25%{opacity:1}100%{opacity:0;background-position:-95% 0}}
  .stage.single .result img{height:100%;width:auto;max-width:100%;aspect-ratio:958/1280;object-fit:contain;
    border-radius:16px;box-shadow:0 0 80px -6px var(--rc,#E9B84A),0 0 150px -12px var(--rc,#E9B84A)}
  .stage.single .badge{top:14px;left:14px;font-size:12px;padding:5px 11px}
  /* YOU GOT text + CONTINUE lifted above backdrop */
  .stage.single ~ .info{position:fixed !important;left:0;right:var(--panel);top:auto;bottom:96px;z-index:41;height:auto;text-align:center;animation:rvFade .5s ease .25s both}
  .stage.single ~ .info .you{font-size:13px}
  .stage.single ~ .info .got{font-size:24px}
  .stage.single ~ .acts{position:fixed !important;left:0;right:var(--panel);top:auto;bottom:26px;z-index:41;display:flex;justify-content:center;animation:rvFade .5s ease .3s both}


  @media(max-width:900px){
    .stage.single .result{max-width:84vw;top:5vh;height:min(62vh, calc(100vh - 190px))}
  }

  /* ===== HINGE OPEN SYSTEM ===== */
  .hinge-rig{position:absolute;inset:0;margin:auto;width:84%;height:84%;display:none;perspective:1300px}
  .stage.hinge .hinge-rig{display:block}
  .stage.hinge .whole,.stage.hinge .half,.stage.hinge .inside,.stage.hinge .bowl,.stage.hinge .lid{display:none}
  .hr-base{position:absolute;left:50%;bottom:2%;width:92%;transform:translateX(-50%);z-index:1;filter:drop-shadow(0 8px 20px rgba(0,0,0,.6))}
  .hr-hinge{position:absolute;left:50%;bottom:33%;width:34%;transform:translateX(-50%);z-index:2;opacity:.95}
  .lidpivot{position:absolute;left:50%;top:0;width:82%;transform:translateX(-50%);transform-style:preserve-3d;
    transform-origin:50% 92%;transition:transform .95s cubic-bezier(.34,.72,.18,1);z-index:3}
  .lidpivot .lf{display:block;width:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden}
  .lidpivot .lf.in{position:absolute;inset:0;transform:rotateX(180deg)}
  .stage.hinge.charging .lidpivot{animation:cshake .14s linear infinite;filter:brightness(1.35) drop-shadow(0 0 16px var(--burst))}
  .stage.hinge.opening .lidpivot{transform:translateX(-50%) rotateX(-132deg)}
  /* inner glow rising from base when open */
  .stage.hinge.opening .core{opacity:1;transform:scale(1.3) translateY(8%)}

  /* ===== VIDEO REVEAL ===== */
  .capvideo{position:absolute;inset:0;margin:auto;width:100%;height:100%;object-fit:contain;z-index:2;display:none;border-radius:10px}
  .stage.vid .capvideo{display:block}
  .stage.vid .whole,.stage.vid .half,.stage.vid .inside,.stage.vid .bowl,.stage.vid .lid,.stage.vid .hinge-rig{display:none}
  .stage.vid .core,.stage.vid .rays{display:none}

  /* ===== TRANSITION IMPACT FLASH ===== */
  .fxvid{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:43;opacity:0;
    mix-blend-mode:screen;pointer-events:none;transition:opacity .3s ease;display:block}
  .impact{position:fixed;inset:0;z-index:42;pointer-events:none;opacity:0;mix-blend-mode:screen;
    background:radial-gradient(circle at 50% 47%, #fff 0%, #fff 13%, var(--ic,#ffcf5a) 33%, rgba(255,190,70,.42) 56%, transparent 80%)}
  .impact.go{animation:impactFlash .95s cubic-bezier(.33,0,.25,1) forwards}
  @keyframes impactFlash{
    0%{opacity:0;transform:scale(.45)}
    26%{opacity:.7;transform:scale(.92)}
    42%{opacity:1;transform:scale(1.12)}
    54%{opacity:1;transform:scale(1.2)}
    72%{opacity:.55;transform:scale(1.34)}
    100%{opacity:0;transform:scale(1.55)}}

  /* ===== VIDEO MODE: big capsule, black bg match ===== */
  .stage.vid .capvideo{position:fixed;left:0;right:0;top:0;bottom:0;margin:auto;
    transform:translate(var(--vidx),var(--vidy)) scale(var(--vidscale));
    width:min(74vmin,680px);height:min(74vmin,680px);object-fit:contain;border:0;outline:0;z-index:2;display:block;background:#000;
    -webkit-mask:radial-gradient(circle at 50% 50%, #000 78%, rgba(0,0,0,.4) 90%, transparent 99%);
            mask:radial-gradient(circle at 50% 50%, #000 78%, rgba(0,0,0,.4) 90%, transparent 99%)}
  .stage.vid .floor{display:none}
  /* keep OPEN buttons reachable over the big video */
  .stage.vid ~ .acts{position:fixed;left:0;right:var(--panel);bottom:30px;z-index:45;display:flex;justify-content:center;gap:12px}
  /* status bar to top so it isn't hidden behind big video */
  .stage.vid ~ .info{position:relative;z-index:3}
  /* ===== Scrollbar: thin subtle gold (horizontal bar hidden) ===== */
  ::-webkit-scrollbar{width:8px;height:8px}

  ::-webkit-scrollbar-thumb{background:rgba(233,184,74,.30);border-radius:8px}

  html{scrollbar-width:thin;scrollbar-color:rgba(233,184,74,.4) transparent}

  .pm{width:100%;max-width:370px;background:linear-gradient(180deg,#131009,#0a0805);border:1px solid var(--line);border-radius:16px;padding:24px 22px;font-family:var(--font-body);position:relative}

  body{margin:0;background:#050505;color:#e8e6e0;font-family:var(--font-body,sans-serif)}
  .demobar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;gap:10px;align-items:center;
    padding:12px 18px;background:rgba(8,8,10,.92);border-bottom:1px solid rgba(255,255,255,.1)}
  .demobar b{font-family:var(--font-head);letter-spacing:1px;font-size:13px;color:#E9B84A;margin-right:6px}
  .demobar button{font-family:var(--font-head);font-size:12.5px;letter-spacing:.5px;
    border:1px solid rgba(255,255,255,.2);background:transparent;color:#cfccc4;
    border-radius:8px;padding:9px 16px;cursor:pointer}
  .demobar button.on{border-color:#E9B84A;color:#E9B84A;background:rgba(233,184,74,.1)}

</style></head>
<body>
  <div class="demobar">
    <b>10-PULL REVEAL</b>
    <button id="btnA" class="on">A · 1장 → 10장 분열</button>
    <button id="btnB">B · 1장씩 순차 공개</button>
    <button id="btnReplay">↻ 다시 보기</button>
    <span class="hint">버튼을 눌러 두 연출을 비교해보세요</span>
  </div>

  <div class="multi show" id="multi">
    <div class="mwrap">
      <h3>OPENED ×10</h3>
      <div class="mgrid" id="mgrid"></div>
      <div class="summary" id="msum"></div>
      <div class="macts">
        <button class="b share" id="mshareBtn">SHARE</button>
        <button class="b solid" id="mclose">CONTINUE</button>
      </div>
    </div>
  </div>

<script>
var MODE='split';
var RAR=[
  {key:'common',label:'COMMON',color:'#cfccc4'},
  {key:'rare',label:'RARE',color:'#5b9bd5'},
  {key:'epic',label:'EPIC',color:'#c468d8'},
  {key:'legendary',label:'LEGENDARY',color:'#E9B84A'},
  {key:'mythic',label:'MYTHIC',color:'#e0556a'}
];
function items10(){
  var out=[];
  for(var i=0;i<10;i++){
    var r=RAR[i%5];
    out.push({char:'CARD '+(i+1), rarity:r.label, rkey:r.key, color:r.color,
              img:'images/detail/'+r.key+'.png', dup: i%3===0});
  }
  return out;
}
function reveal(){
  var items=items10();
  var grid=document.getElementById('mgrid');
  grid.innerHTML=items.map(function(it){
    return '<div class="mcard" style="--rc:'+it.color+'">'+
      '<span class="mb '+(it.dup?'dup':'new')+'">'+(it.dup?'COLLECTED':'NEW')+'</span>'+
      '<img src="'+it.img+'" alt="">'+
      '<div class="mf"><div class="mn">'+it.char+'</div><div class="mr">'+it.rarity+'</div></div>'+
    '</div>';
  }).join('');
  var tal={}; items.forEach(function(p){ tal[p.rarity]=(tal[p.rarity]||0)+1; });
  document.getElementById('msum').innerHTML=RAR.filter(function(r){return tal[r.label];})
    .map(function(r){ return '<span style="color:'+r.color+'">'+r.label+' <b>×'+tal[r.label]+'</b></span>'; }).join('');

  requestAnimationFrame(function(){
    var cards=[].slice.call(grid.children);
    if(MODE==='seq'){
      cards.forEach(function(el,i){ el.style.animationDelay=(i*0.11)+'s'; el.classList.add('seq'); });
      return;
    }
    var gb=grid.getBoundingClientRect(), cx=gb.width/2, cy=gb.height/2;
    cards.forEach(function(el,i){
      var r=el.getBoundingClientRect();
      var ex=(r.left-gb.left)+r.width/2, ey=(r.top-gb.top)+r.height/2;
      el.style.setProperty('--dx',(cx-ex)+'px');
      el.style.setProperty('--dy',(cy-ey)+'px');
      el.style.animationDelay=(0.45+i*0.05)+'s';
      el.classList.add('split');
    });
  });
}
document.getElementById('btnA').onclick=function(){
  MODE='split'; this.classList.add('on'); document.getElementById('btnB').classList.remove('on'); reveal();
};
document.getElementById('btnB').onclick=function(){
  MODE='seq'; this.classList.add('on'); document.getElementById('btnA').classList.remove('on'); reveal();
};
document.getElementById('btnReplay').onclick=reveal;
reveal();
</script>
</body></html>
