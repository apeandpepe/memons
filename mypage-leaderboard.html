<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEMONS — Leaderboard</title>
<link rel="stylesheet" href="fonts.css">
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
<style>
  :root{
    --bg:#050505;--panel:#0d0d10;--panel2:#141418;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);
    --text:#e8e6e0;--muted:#8d8a82;--dim:#55524b;
    --gold:#E9B84A;--gold2:#f4d27a;--gold-b:#b8862e;--good:#5ccf92;--bad:#e0556a;--x:#4aa3ff;--pur:#b884ff;
    --sbw:220px;--tbh:70px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;min-height:100vh;
    background-image:radial-gradient(1100px 480px at 82% -8%, rgba(233,184,74,.06), transparent 62%)}
  a{color:inherit;text-decoration:none}

  .head{position:fixed;top:0;left:0;right:0;height:var(--tbh);display:flex;align-items:center;justify-content:space-between;
    padding:0 34px;border-bottom:1px solid var(--line);background:rgba(5,5,5,.9);backdrop-filter:blur(10px);z-index:30}
  .brand img{height:44px;width:auto;display:block}
  .nav{display:flex;gap:30px;font-size:12.5px;letter-spacing:1px;font-family:var(--font-head)}
  .nav a{color:var(--muted)}.nav a:hover,.nav a.on{color:var(--gold)}
  .hr{display:flex;align-items:center;gap:14px}
  .soc{display:flex;gap:10px}
  .soc a{color:var(--muted)} .soc svg{width:17px;height:17px;fill:currentColor}
  .wbtn{display:flex;align-items:center;gap:8px;font-family:var(--font-head);font-size:12px;letter-spacing:1px;color:#1c1500;
    background:linear-gradient(150deg,var(--gold2),var(--gold) 60%);border:none;border-radius:9px;padding:10px 15px;cursor:pointer}
  .wbtn svg{width:16px;height:16px;fill:none;stroke:#1c1500;stroke-width:1.7}
  .wicon{width:38px;height:38px;border-radius:10px;border:1px solid var(--line2);background:var(--panel);display:none;align-items:center;justify-content:center;color:var(--gold);cursor:pointer}
  .wicon svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.7}
  .mpbtn{display:none;align-items:center;gap:8px;font-family:var(--font-head);font-size:12px;letter-spacing:1px;color:#1c1500;
    background:linear-gradient(150deg,var(--gold2),var(--gold) 60%);border:none;border-radius:9px;padding:10px 15px;cursor:pointer}
  body.connected .wbtn{display:none} body.connected .wicon{display:flex} body.connected .mpbtn{display:flex}

  .shell{display:flex;padding-top:var(--tbh)}
  .sidebar{position:fixed;top:var(--tbh);bottom:0;left:0;width:var(--sbw);border-right:1px solid var(--line);
    padding:24px 16px;display:flex;flex-direction:column;background:linear-gradient(180deg,#0a0a0d,#050505);z-index:20}
  .mylabel{font-family:var(--font-head);font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:4px 12px 14px;font-weight:700;
    background:linear-gradient(180deg,var(--gold2),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .snav{display:flex;flex-direction:column;gap:6px}
  .snav a{font-family:var(--font-head);padding:11px 12px;border-radius:11px;font-size:14px;color:var(--muted);display:flex;align-items:center;gap:11px}
  .snav a i{font-size:18px;width:20px;text-align:center}
  .snav a:hover{color:var(--text);background:var(--panel2)}
  .snav a.on{color:var(--gold);background:rgba(233,184,74,.08);box-shadow:inset 0 0 0 1px rgba(233,184,74,.2)}
  .side-foot{margin-top:auto}
  .wchip{padding:11px 13px;border:1px solid var(--line2);border-radius:12px;background:var(--panel)}
  .wchip .wa{font-size:12.5px;font-weight:600;font-family:var(--font-head)}
  .wchip .ws{font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:3px}
  .wchip .ws::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--dim)}
  body.connected .wchip .ws{color:var(--good)} body.connected .wchip .ws::before{background:var(--good)}
  .wdisc{margin-top:9px;width:100%;font-family:var(--font-head);font-size:11px;letter-spacing:.6px;display:none;
    background:transparent;border:1px solid var(--line2);color:var(--muted);border-radius:9px;padding:8px;cursor:pointer}
  .wdisc:hover{color:#e0556a;border-color:rgba(224,85,106,.5)} body.connected .wdisc{display:block}

  .main{margin-left:var(--sbw);flex:1;min-width:0;display:flex;justify-content:center}
  .wrap{padding:34px 40px 80px;width:100%;max-width:920px}
  .eyebrow{font-family:var(--font-head);font-size:11px;letter-spacing:5px;color:var(--gold-b);margin-bottom:12px}
  h1{font-family:var(--font-head);font-weight:800;font-size:28px;letter-spacing:1px}
  .sub{color:var(--muted);font-size:13.5px;margin-top:10px}
  .back{font-family:var(--font-head);font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:5px;margin-bottom:16px}
  .back:hover{color:var(--gold)}

  .panel{border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:10px 22px;margin-top:22px}
  .lbempty{padding:44px 16px;text-align:center;color:var(--muted);font-size:13.5px}
  .lbrow{display:flex;align-items:center;gap:14px;padding:14px 0;border-top:1px solid var(--line)}
  .lbrow:first-child{border-top:0}
  .lbrow .lrank{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:800;font-size:13px;flex-shrink:0;background:var(--panel2);color:var(--muted)}
  .lbrow.top1 .lrank{background:linear-gradient(150deg,#f4d27a,#E9B84A);color:#1c1500}
  .lbrow.top2 .lrank{background:linear-gradient(150deg,#e8e8e8,#b8b8b8);color:#1c1500}
  .lbrow.top3 .lrank{background:linear-gradient(150deg,#e0a066,#b87333);color:#1c1500}
  .lbrow .lav{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--panel2)}
  .lbrow .laddr{font-family:var(--font-head);font-size:14px;font-weight:600}
  .lbrow .lsub{font-size:11px;color:var(--dim);margin-top:2px}
  .lbrow .lref{margin-left:auto;font-family:var(--font-head);font-size:15px;font-weight:700}
  .lbrow .lref small{color:var(--muted);font-weight:400;font-size:11px;margin-left:3px}

  .pager{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:24px;flex-wrap:wrap}
  .pager button{font-family:var(--font-head);font-size:13px;min-width:36px;height:36px;border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:9px;cursor:pointer;padding:0 10px}
  .pager button:hover:not(:disabled){color:var(--text);border-color:var(--line2)}
  .pager button.on{color:var(--gold);border-color:var(--gold-b);background:rgba(233,184,74,.08)}
  .pager button:disabled{opacity:.4;cursor:not-allowed}
  .note{text-align:center;color:var(--dim);font-size:12px;margin-top:14px}
  @media(max-width:900px){.sidebar{display:none}.main{margin-left:0}.wrap{padding:24px 16px 70px}}
</style>
</head>
<body>

<header class="head">
  <div class="brand"><a href="index.html"><img src="images/logo.png" alt="MEMONS"></a></div>
  <nav class="nav">
    <a href="index.html#home">HOME</a><a href="index.html#about">ABOUT</a><a href="index.html#vault">MEMONS VAULT</a>
    <a href="index.html#capsule">OPEN CAPSULE</a><a href="index.html#marketplace">MARKETPLACE</a><a href="notice.html">NOTICE</a><a href="index.html#contact">CONTACT</a>
  </nav>
  <div class="hr">
    <div class="soc">
      <a href="#" aria-label="Telegram"><svg viewBox="0 0 24 24"><path d="M21.9 4.3 18.7 19.6c-.2 1-.9 1.3-1.8.8l-4.9-3.6-2.4 2.3c-.3.3-.5.5-1 .5l.3-5 9.1-8.2c.4-.4-.1-.6-.6-.2L4.5 13.4l-4.8-1.5c-1-.3-1-.9.2-1.4l18.8-7.2c.9-.3 1.6.2 1.2 1Z"/></svg></a>
      <a href="#" aria-label="X"><svg viewBox="0 0 24 24"><path d="M18.9 2H22l-7.5 8.6L23 22h-6.8l-5.3-6.9L4.8 22H1.7l8-9.2L1 2h7l4.8 6.3L18.9 2Zm-2.4 18h1.9L7.6 3.9H5.6L16.5 20Z"/></svg></a>
    </div>
    <button class="wbtn" id="wbtn"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M16 12h2"/></svg> CONNECT WALLET</button>
    <div class="wicon" id="wicon"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M16 12h2"/></svg></div>
    <button class="mpbtn" id="mpbtn">My Page</button>
  </div>
</header>

<div class="shell">
  <aside class="sidebar">
    <div class="mylabel">My Page</div>
    <nav class="snav">
      <a href="mypage-dashboard.html"><i class="ti ti-home"></i>Dashboard</a>
      <a href="mypage-missions.html"><i class="ti ti-flag"></i>Event Mission</a>
      <a href="mypage-collection.html"><i class="ti ti-cards"></i>Collection</a>

  <main class="main"><div class="wrap">

  </div></main>
</div>

<script src="gacha-client.js"></script>
<script src="mypage-entry.js"></script>
<script src="leaderboard.js"></script>
<script>
(function(){
  var PER=10, page=1;
  function $(id){return document.getElementById(id);}
  var data=(window.MEMONS_LEADERBOARD||[]);

  function render(){
    var total=data.length, pages=Math.max(1,Math.ceil(total/PER));
    if(total===0){
      $('lb').innerHTML='<div class="lbempty">'+(window.MEMONS_LB_READY
        ? 'No referrers yet. Rankings update once a day.'
        : 'Loading rankings...')+'</div>';
      $('pager').innerHTML=''; $('note').textContent='';
      return;
    }
    if(page>pages) page=pages;
    var start=(page-1)*PER, slice=data.slice(start,start+PER);
    $('lb').innerHTML=slice.map(function(e){
      var cls=e.rank<=3?(' top'+e.rank):'';
      return '<div class="lbrow'+cls+'"><div class="lrank">'+e.rank+'</div>'+
        '<img class="lav" src="images/mypage/dash/avatar.png" alt="" onerror="this.style.visibility=\'hidden\'">'+
        '<div><div class="laddr">'+e.address+'</div><div class="lsub">Referrer</div></div>'+
        '<div class="lref">'+e.referrals+'<small>Users</small></div></div>';
    }).join('');

    var pg=$('pager'); pg.innerHTML='';
    if(pages>1){
      var mk=function(l,to,dis,on){ var b=document.createElement('button'); b.textContent=l;
        if(dis)b.disabled=true; if(on)b.className='on';
        b.onclick=function(){ page=to; render(); window.scrollTo({top:0,behavior:'smooth'}); }; return b; };
      pg.appendChild(mk('‹',page-1,page<=1,false));
      for(var i=1;i<=pages;i++) pg.appendChild(mk(String(i),i,false,i===page));
      pg.appendChild(mk('›',page+1,page>=pages,false));
    }
    $('note').textContent='Showing '+(start+1)+'–'+(start+slice.length)+' of '+total+' referrers';
  }
  window.MEMONS_LB_ONLOAD=function(rows){ data=rows||[]; page=1; render(); };
  render();
  if(window.MEMONS_LB_READY) window.MEMONS_LB_ONLOAD(window.MEMONS_LEADERBOARD);
})();
</script>
<style>
  .m-burger{display:none;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.03);color:#E9B84A;cursor:pointer;padding:0;margin-right:6px}
  .m-burger svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none}
  .m-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s;z-index:1040}
  .m-overlay.open{opacity:1;pointer-events:auto}
  .m-drawer{position:fixed;top:0;left:0;bottom:0;width:264px;max-width:82vw;background:linear-gradient(180deg,#0a0a0d,#050505);border-right:1px solid rgba(255,255,255,.1);transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:1041;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:4px;-webkit-overflow-scrolling:touch}
  .m-drawer.open{transform:translateX(0)}
  .m-drawer .m-close{align-self:flex-end;background:transparent;border:0;color:#8d8a82;cursor:pointer;padding:4px;margin-bottom:2px}
  .m-drawer .m-close svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none}
  .m-drawer .m-sec{font-family:var(--font-head,inherit);font-size:10px;letter-spacing:2px;color:#E9B84A;font-weight:700;padding:12px 12px 6px}
  .m-drawer a{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;font-size:14px;color:#8d8a82;font-family:var(--font-head,inherit);text-decoration:none}
  .m-drawer a:hover{color:#e8e6e0;background:rgba(255,255,255,.04)}
  .m-drawer a.on{color:#E9B84A;background:rgba(233,184,74,.08)}
  .m-drawer a i{font-size:18px;width:20px;text-align:center}
  html,body{overflow-x:hidden;max-width:100vw}
  @media(max-width:1040px){
    .head nav{display:none !important}
    .m-burger{display:flex}
    .sidebar{display:none !important}
    .main{margin-left:0 !important}
    .shell .wrap,.main .wrap{padding-left:16px !important;padding-right:16px !important}
    .head .soc{display:none !important}
    .head{padding-left:14px !important;padding-right:14px !important;gap:10px !important;justify-content:flex-start !important}
    .head .hr{gap:8px !important;margin-left:auto !important}
    .head .brand img{height:32px !important}
    .mypage-entry,.mpbtn{display:none !important}
    .wrap{margin-left:auto !important;margin-right:auto !important}
    .wbtn,.mpbtn,.wicon{padding:8px 10px !important;font-size:11px !important;white-space:nowrap}
    .wbtn svg,.wicon svg{width:14px !important;height:14px !important}
    .head .brand{font-size:15px !important}
  }
</style>
<button class="m-burger" id="mBurger" aria-label="Open menu"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
<div class="m-overlay" id="mOverlay"></div>
<nav class="m-drawer" id="mDrawer"></nav>
<script>
(function(){
  var drawer=document.getElementById('mDrawer'), overlay=document.getElementById('mOverlay'), burger=document.getElementById('mBurger');
  if(!drawer) return;
  var close=document.createElement('button'); close.className='m-close'; close.setAttribute('aria-label','Close menu');
  close.innerHTML='<svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';
  drawer.appendChild(close);
  var snav=document.querySelector('.snav');
  var myBox=null;
  if(snav){ var s1=document.createElement('div'); s1.className='m-sec'; s1.textContent='MY PAGE'; drawer.appendChild(s1);
    Array.prototype.forEach.call(snav.querySelectorAll('a'),function(a){ drawer.appendChild(a.cloneNode(true)); }); }
  else {
    myBox=document.createElement('div');
    var ms=document.createElement('div'); ms.className='m-sec'; ms.textContent='MY PAGE'; myBox.appendChild(ms);
    var ml=document.createElement('a'); ml.href='mypage-dashboard.html'; ml.textContent='Go to My Page'; ml.style.color='#E9B84A'; ml.style.fontWeight='700'; myBox.appendChild(ml);
    myBox.style.display='none'; drawer.appendChild(myBox);
  }
  var topnav=document.querySelector('.head nav');
  if(topnav){ var s2=document.createElement('div'); s2.className='m-sec'; s2.textContent='MENU'; drawer.appendChild(s2);
    Array.prototype.forEach.call(topnav.querySelectorAll('a'),function(a){ drawer.appendChild(a.cloneNode(true)); }); }
  var head=document.querySelector('.head');
  if(head && burger){ head.insertBefore(burger, head.firstChild); } else if(burger){ burger.style.display='none'; }
  function syncMy(){ if(myBox){ myBox.style.display = document.body.classList.contains('wallet-connected') ? 'block' : 'none'; } }
  function openD(){ syncMy(); drawer.classList.add('open'); overlay.classList.add('open'); }
  function closeD(){ drawer.classList.remove('open'); overlay.classList.remove('open'); }
  if(burger) burger.addEventListener('click',openD);
  close.addEventListener('click',closeD); overlay.addEventListener('click',closeD);
  drawer.addEventListener('click',function(e){
    var a = e.target && e.target.closest ? e.target.closest('a') : null;
    if(!a) return;
    var href = a.getAttribute('href') || '';
    closeD();
    if(href.charAt(0) === '#' && href.length > 1){
      var t = null;
      try{ t = document.querySelector(href); }catch(err){}
      if(t){
        e.preventDefault();
        setTimeout(function(){
          var sc = document.scrollingElement || document.documentElement;
          if(sc.scrollWidth > sc.clientWidth + 4){
            sc.scrollTo({ left: t.offsetLeft, top: 0, behavior:'smooth' });
          } else {
            t.scrollIntoView({ behavior:'smooth', block:'start' });
          }
        }, 220);
      }
    }
  });
})();
</script>
